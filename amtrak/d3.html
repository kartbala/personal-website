<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtrak Routes — D3 Data Visualization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title-overlay">
        <h1>Amtrak Routes</h1>
        <p>Routes I've ridden highlighted in gold</p>
    </div>
    <div class="legend">
        <div class="legend-item"><span class="legend-line ridden"></span> Routes I've ridden</div>
        <div class="legend-item"><span class="legend-line all"></span> All Amtrak routes</div>
        <div class="legend-item legend-toggle" id="parks-toggle">
            <span class="legend-dot"></span> National parks
            <span class="toggle-hint">(click to show)</span>
        </div>
    </div>
    <style>
        .legend-toggle { cursor: pointer; opacity: 0.5; transition: opacity 0.3s; }
        .legend-toggle.active { opacity: 1; }
        .toggle-hint { font-size: 11px; color: #5a5850; margin-left: 4px; }
    </style>
    <div class="tooltip" id="tooltip"></div>
    <div class="map-container" id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <script>
    (function() {
        // Station labels along completed routes
        const STATION_LABELS = [
            {code:'LAX', name:'Los Angeles', lng:-118.2368, lat:34.0562},
            {code:'SNB', name:'San Bernardino', lng:-117.3107, lat:34.1041},
            {code:'BAR', name:'Barstow', lng:-117.0254, lat:34.9048},
            {code:'NDL', name:'Needles', lng:-114.6062, lat:34.8406},
            {code:'KNG', name:'Kingman', lng:-114.0528, lat:35.1883},
            {code:'FLG', name:'Flagstaff', lng:-111.6489, lat:35.1974},
            {code:'CHI', name:'Chicago', lng:-87.641, lat:41.879},
            {code:'IND', name:'Indianapolis', lng:-86.1604, lat:39.762},
            {code:'CIN', name:'Cincinnati', lng:-84.5371, lat:39.1099},
            {code:'HUN', name:'Huntington', lng:-82.4397, lat:38.4158},
            {code:'CHW', name:'Charleston WV', lng:-81.6385, lat:38.3464},
            {code:'HIN', name:'Hinton', lng:-80.8922, lat:37.675},
            {code:'WSS', name:'White Sulphur Spgs', lng:-80.304, lat:37.7864},
            {code:'CLF', name:'Clifton Forge', lng:-79.8274, lat:37.8145},
            {code:'STA', name:'Staunton', lng:-79.0718, lat:38.1476},
            {code:'RGH', name:'Raleigh', lng:-78.6478, lat:35.7772},
            {code:'CVS', name:'Charlottesville', lng:-78.4917, lat:38.0315},
            {code:'RMT', name:'Rocky Mount', lng:-77.7979, lat:35.938},
            {code:'RVR', name:'Richmond', lng:-77.4969, lat:37.6177},
            {code:'FBG', name:'Fredericksburg', lng:-77.4577, lat:38.2981},
            {code:'PTB', name:'Petersburg', lng:-77.4288, lat:37.2416},
            {code:'ALX', name:'Alexandria', lng:-77.0623, lat:38.8065},
            {code:'WAS', name:'Washington DC', lng:-77.0064, lat:38.897},
            {code:'BAL', name:'Baltimore', lng:-76.6157, lat:39.3073},
            {code:'WIL', name:'Wilmington', lng:-75.5511, lat:39.7373},
            {code:'PHL', name:'Philadelphia', lng:-75.181, lat:39.9556},
            {code:'TRE', name:'Trenton', lng:-74.7544, lat:40.219},
            {code:'EWR', name:'Newark', lng:-74.1823, lat:40.6966},
            {code:'NYP', name:'New York', lng:-73.9963, lat:40.751},
            {code:'POU', name:'Poughkeepsie', lng:-73.9375, lat:41.7071},
            {code:'SAR', name:'Saratoga Springs', lng:-73.81, lat:43.0828},
            {code:'ALB', name:'Albany', lng:-73.7411, lat:42.641},
            {code:'MTR', name:'Montreal', lng:-73.5658, lat:45.5002},
            {code:'PLB', name:'Plattsburgh', lng:-73.4463, lat:44.6967},
            {code:'NHV', name:'New Haven', lng:-72.9267, lat:41.2977},
            {code:'PVD', name:'Providence', lng:-71.4135, lat:41.8295},
            {code:'BOS', name:'Boston', lng:-71.0553, lat:42.3523},
        ];

        // Routes Karthik has ridden (fully)
        const COMPLETED_ROUTES = ['Cardinal', 'Acela', 'Carolinian', 'Adirondack'];
        // Partial routes: only show segment west of clipLng
        const PARTIAL_ROUTES = { 'Southwest Chief': -111.65 };

        function isCompletedRoute(name) {
            return COMPLETED_ROUTES.some(r => name === r || name.includes(r));
        }
        function getPartialClip(name) {
            for (const [route, lng] of Object.entries(PARTIAL_ROUTES)) {
                if (name.includes(route)) return lng;
            }
            return null;
        }

        function clipLineCoords(coords, clipLng) {
            return coords.filter(pt => pt[0] <= clipLng);
        }

        function clipFeature(feature) {
            const clipLng = getPartialClip(feature.properties.name);
            if (!clipLng) return feature;
            const geom = feature.geometry;
            const clipped = JSON.parse(JSON.stringify(feature));
            if (geom.type === 'MultiLineString') {
                clipped.geometry.coordinates = geom.coordinates
                    .map(line => clipLineCoords(line, clipLng))
                    .filter(line => line.length >= 2);
            } else if (geom.type === 'LineString') {
                clipped.geometry.coordinates = clipLineCoords(geom.coordinates, clipLng);
            }
            return clipped;
        }

        const width = window.innerWidth;
        const height = window.innerHeight;
        const tooltip = document.getElementById('tooltip');

        const svg = d3.select('#map')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        // Glow filter
        const defs = svg.append('defs');
        const filter = defs.append('filter').attr('id', 'glow');
        filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
        const merge = filter.append('feMerge');
        merge.append('feMergeNode').attr('in', 'blur');
        merge.append('feMergeNode').attr('in', 'SourceGraphic');

        const projection = d3.geoAlbersUsa()
            .scale(width * 1.3)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const g = svg.append('g');

        // Zoom
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        svg.call(zoom);

        // Load all data
        Promise.all([
            d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'),
            d3.json('routes.geojson'),
            d3.json('stations.geojson'),
            d3.json('parks.json')
        ]).then(([us, routes, stations, parks]) => {
            // Draw states
            const states = topojson.feature(us, us.objects.states);
            g.append('g')
                .selectAll('path')
                .data(states.features)
                .join('path')
                .attr('d', path)
                .attr('fill', '#12121a')
                .attr('stroke', '#1a1a2e')
                .attr('stroke-width', 0.5);

            // Draw all routes (dim)
            g.append('g')
                .selectAll('path')
                .data(routes.features)
                .join('path')
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', '#2a2a3e')
                .attr('stroke-width', 1.5)
                .attr('opacity', 0.4)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('stroke', '#3a3a5e').attr('opacity', 0.7);
                    showTooltip(event, d.properties.name);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('stroke', '#2a2a3e').attr('opacity', 0.4);
                    hideTooltip();
                });

            // Draw completed routes (gold + glow)
            const completedFeatures = routes.features
                .filter(f => isCompletedRoute(f.properties.name))
                .map(f => f);
            const partialFeatures = routes.features
                .filter(f => getPartialClip(f.properties.name) !== null)
                .map(f => clipFeature(f))
                .filter(f => {
                    const g = f.geometry;
                    if (g.type === 'MultiLineString') return g.coordinates.length > 0;
                    if (g.type === 'LineString') return g.coordinates.length >= 2;
                    return false;
                });

            const allHighlighted = [...completedFeatures, ...partialFeatures];

            g.append('g')
                .selectAll('path')
                .data(allHighlighted)
                .join('path')
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', '#d4a847')
                .attr('stroke-width', 2.5)
                .attr('filter', 'url(#glow)')
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('stroke-width', 3.5);
                    const name = d.properties.name;
                    const label = getPartialClip(name) ? name + ' (LA → Flagstaff)' : name;
                    showTooltip(event, label);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('stroke-width', 2.5);
                    hideTooltip();
                });

            // Draw all station dots (tiny)
            const stationPoints = stations.features
                .map(f => {
                    const coords = f.geometry.coordinates;
                    const projected = projection(coords);
                    return projected ? { ...f, projected } : null;
                })
                .filter(Boolean);

            g.append('g')
                .selectAll('circle')
                .data(stationPoints)
                .join('circle')
                .attr('cx', d => d.projected[0])
                .attr('cy', d => d.projected[1])
                .attr('r', 1.5)
                .attr('fill', '#1a1a2e')
                .attr('stroke', 'none');

            // Draw park dots (hidden by default)
            const parksGroup = g.append('g')
                .attr('class', 'parks-layer')
                .style('display', 'none');

            parksGroup.selectAll('circle')
                .data(parks)
                .join('circle')
                .attr('cx', d => {
                    const p = projection([d.lng, d.lat]);
                    return p ? p[0] : -999;
                })
                .attr('cy', d => {
                    const p = projection([d.lng, d.lat]);
                    return p ? p[1] : -999;
                })
                .attr('r', 5)
                .attr('fill', '#4a9e6e')
                .attr('stroke', '#0a0a0f')
                .attr('stroke-width', 1)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 7);
                    showTooltip(event, d.fullName);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('r', 5);
                    hideTooltip();
                });

            // Draw station labels on completed routes
            const stationLabelGroup = g.append('g').attr('class', 'station-labels');

            const labelData = STATION_LABELS
                .map(s => {
                    const p = projection([s.lng, s.lat]);
                    return p ? { ...s, px: p[0], py: p[1] } : null;
                })
                .filter(Boolean);

            // Gold dots for labeled stations (names in tooltips)
            stationLabelGroup.selectAll('circle')
                .data(labelData)
                .join('circle')
                .attr('cx', d => d.px)
                .attr('cy', d => d.py)
                .attr('r', 2.5)
                .attr('fill', '#f0d080')
                .attr('stroke', '#0a0a0f')
                .attr('stroke-width', 0.5)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 4);
                    showTooltip(event, d.name);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('r', 2.5);
                    hideTooltip();
                });

            // Parks toggle
            const toggle = document.getElementById('parks-toggle');
            toggle.addEventListener('click', () => {
                const active = toggle.classList.toggle('active');
                parksGroup.style('display', active ? null : 'none');
                toggle.querySelector('.toggle-hint').textContent = active ? '(click to hide)' : '(click to show)';
            });
        });

        function showTooltip(event, text) {
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            tooltip.style.left = (event.pageX + 12) + 'px';
            tooltip.style.top = (event.pageY - 8) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }
    })();
    </script>
</body>
</html>
