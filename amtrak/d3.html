<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtrak Routes — D3 Data Visualization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title-overlay">
        <h1>Amtrak Routes</h1>
        <p>Routes I've ridden highlighted in gold</p>
    </div>
    <a href="index.html" class="back-link">&larr; All versions</a>
    <div class="legend">
        <div class="legend-item"><span class="legend-line ridden"></span> Routes I've ridden</div>
        <div class="legend-item"><span class="legend-line all"></span> All Amtrak routes</div>
        <div class="legend-item"><span class="legend-dot"></span> National parks</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <div class="map-container" id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <script>
    (function() {
        // Routes Karthik has ridden (fully)
        const COMPLETED_ROUTES = ['Cardinal', 'Regional', 'Acela', 'NEC'];
        // Partial routes: only show segment west of clipLng
        const PARTIAL_ROUTES = { 'Southwest Chief': -111.65 };

        function isCompletedRoute(name) {
            return COMPLETED_ROUTES.some(r => name === r || name.includes(r));
        }
        function getPartialClip(name) {
            for (const [route, lng] of Object.entries(PARTIAL_ROUTES)) {
                if (name.includes(route)) return lng;
            }
            return null;
        }

        function clipLineCoords(coords, clipLng) {
            return coords.filter(pt => pt[0] <= clipLng);
        }

        function clipFeature(feature) {
            const clipLng = getPartialClip(feature.properties.name);
            if (!clipLng) return feature;
            const geom = feature.geometry;
            const clipped = JSON.parse(JSON.stringify(feature));
            if (geom.type === 'MultiLineString') {
                clipped.geometry.coordinates = geom.coordinates
                    .map(line => clipLineCoords(line, clipLng))
                    .filter(line => line.length >= 2);
            } else if (geom.type === 'LineString') {
                clipped.geometry.coordinates = clipLineCoords(geom.coordinates, clipLng);
            }
            return clipped;
        }

        const width = window.innerWidth;
        const height = window.innerHeight;
        const tooltip = document.getElementById('tooltip');

        const svg = d3.select('#map')
            .append('svg')
            .attr('width', width)
            .attr('height', height);

        // Glow filter
        const defs = svg.append('defs');
        const filter = defs.append('filter').attr('id', 'glow');
        filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
        const merge = filter.append('feMerge');
        merge.append('feMergeNode').attr('in', 'blur');
        merge.append('feMergeNode').attr('in', 'SourceGraphic');

        const projection = d3.geoAlbersUsa()
            .scale(width * 1.3)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const g = svg.append('g');

        // Zoom
        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
            });
        svg.call(zoom);

        // Load all data
        Promise.all([
            d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json'),
            d3.json('routes.geojson'),
            d3.json('stations.geojson'),
            d3.json('parks.json')
        ]).then(([us, routes, stations, parks]) => {
            // Draw states
            const states = topojson.feature(us, us.objects.states);
            g.append('g')
                .selectAll('path')
                .data(states.features)
                .join('path')
                .attr('d', path)
                .attr('fill', '#12121a')
                .attr('stroke', '#1a1a2e')
                .attr('stroke-width', 0.5);

            // Draw all routes (dim)
            g.append('g')
                .selectAll('path')
                .data(routes.features)
                .join('path')
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', '#2a2a3e')
                .attr('stroke-width', 1.5)
                .attr('opacity', 0.4)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('stroke', '#3a3a5e').attr('opacity', 0.7);
                    showTooltip(event, d.properties.name);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('stroke', '#2a2a3e').attr('opacity', 0.4);
                    hideTooltip();
                });

            // Draw completed routes (gold + glow)
            const completedFeatures = routes.features
                .filter(f => isCompletedRoute(f.properties.name))
                .map(f => f);
            const partialFeatures = routes.features
                .filter(f => getPartialClip(f.properties.name) !== null)
                .map(f => clipFeature(f))
                .filter(f => {
                    const g = f.geometry;
                    if (g.type === 'MultiLineString') return g.coordinates.length > 0;
                    if (g.type === 'LineString') return g.coordinates.length >= 2;
                    return false;
                });

            const allHighlighted = [...completedFeatures, ...partialFeatures];

            g.append('g')
                .selectAll('path')
                .data(allHighlighted)
                .join('path')
                .attr('d', path)
                .attr('fill', 'none')
                .attr('stroke', '#d4a847')
                .attr('stroke-width', 2.5)
                .attr('filter', 'url(#glow)')
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('stroke-width', 3.5);
                    const name = d.properties.name;
                    const label = getPartialClip(name) ? name + ' (LA → Flagstaff)' : name;
                    showTooltip(event, label);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('stroke-width', 2.5);
                    hideTooltip();
                });

            // Draw all station dots (tiny)
            const stationPoints = stations.features
                .map(f => {
                    const coords = f.geometry.coordinates;
                    const projected = projection(coords);
                    return projected ? { ...f, projected } : null;
                })
                .filter(Boolean);

            g.append('g')
                .selectAll('circle')
                .data(stationPoints)
                .join('circle')
                .attr('cx', d => d.projected[0])
                .attr('cy', d => d.projected[1])
                .attr('r', 1.5)
                .attr('fill', '#1a1a2e')
                .attr('stroke', 'none');

            // Draw park dots
            g.append('g')
                .selectAll('circle')
                .data(parks)
                .join('circle')
                .attr('cx', d => {
                    const p = projection([d.lng, d.lat]);
                    return p ? p[0] : -999;
                })
                .attr('cy', d => {
                    const p = projection([d.lng, d.lat]);
                    return p ? p[1] : -999;
                })
                .attr('r', 5)
                .attr('fill', '#4a9e6e')
                .attr('stroke', '#0a0a0f')
                .attr('stroke-width', 1)
                .style('cursor', 'pointer')
                .on('mouseenter', function(event, d) {
                    d3.select(this).attr('r', 7);
                    showTooltip(event, d.fullName);
                })
                .on('mousemove', (event) => moveTooltip(event))
                .on('mouseleave', function() {
                    d3.select(this).attr('r', 5);
                    hideTooltip();
                });
        });

        function showTooltip(event, text) {
            tooltip.textContent = text;
            tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            tooltip.style.left = (event.pageX + 12) + 'px';
            tooltip.style.top = (event.pageY - 8) + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }
    })();
    </script>
</body>
</html>
