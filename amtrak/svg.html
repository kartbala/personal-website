<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amtrak Routes — Transit Diagram</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { overflow: auto; }
        .map-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .diagram-svg {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
        }
        .route-line {
            fill: none;
            stroke: #2a2a3e;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s, stroke-width 0.3s;
            cursor: pointer;
        }
        .route-line:hover {
            stroke: #3a3a5e;
            stroke-width: 3;
        }
        .route-line.ridden {
            stroke: #d4a847;
            stroke-width: 3.5;
            filter: url(#glow);
        }
        .route-line.ridden:hover {
            stroke: #e8c05a;
            stroke-width: 4.5;
        }
        .route-line.ridden-partial {
            stroke: #d4a847;
            stroke-width: 3.5;
            filter: url(#glow);
            stroke-dasharray: 12, 4;
        }
        .route-line.ridden-partial:hover {
            stroke: #e8c05a;
            stroke-width: 4.5;
        }
        .station-dot {
            cursor: pointer;
            transition: r 0.2s;
        }
        .station-dot:hover {
            r: 5;
        }
        .station-label {
            font-size: 9px;
            fill: #8a877f;
            font-family: Inter, system-ui, sans-serif;
            pointer-events: none;
        }
        .station-label.major {
            font-size: 11px;
            fill: #c0bdb5;
            font-weight: 500;
        }
        .city-dot {
            fill: #2a2a3e;
            stroke: #0a0a0f;
            stroke-width: 0.5;
        }
        .city-dot.hub {
            fill: #3a3a4e;
        }
        .park-dot {
            cursor: pointer;
            transition: r 0.2s;
        }
        .park-dot:hover {
            r: 7;
        }
        .park-label {
            font-size: 8px;
            fill: #4a9e6e;
            font-family: Inter, system-ui, sans-serif;
            pointer-events: none;
            opacity: 0.8;
        }
        .us-outline {
            fill: none;
            stroke: #1a1a2e;
            stroke-width: 1;
            opacity: 0.4;
        }
    </style>
</head>

    <script>
    (function() {
        const tooltip = document.getElementById('tooltip');

        // Route hover tooltips
        document.querySelectorAll('.route-line').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                tooltip.textContent = el.dataset.route;
                tooltip.style.display = 'block';
            });
            el.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 12) + 'px';
                tooltip.style.top = (e.pageY - 8) + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });

        // Station hover tooltips
        document.querySelectorAll('.station-dot').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                tooltip.textContent = el.dataset.station;
                tooltip.style.display = 'block';
            });
            el.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 12) + 'px';
                tooltip.style.top = (e.pageY - 8) + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });

        // Park hover tooltips
        document.querySelectorAll('.park-dot').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                tooltip.textContent = el.dataset.park;
                tooltip.style.display = 'block';
            });
            el.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.pageX + 12) + 'px';
                tooltip.style.top = (e.pageY - 8) + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    })();
    </script>
